[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q -m "not integration and not manual and not slow and not browser and not e2e"
markers =
    integration: tests that need external service or real systemd
    manual: tests that require manual operation
    slow: long-running tests
    browser: browser-based tests that need Playwright
    e2e: end-to-end tests that may start local services
